<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Inventario Arch Linux</title>
</head>
<body class="container mt-5">
    <div class="d-flex justify-content-between mb-4">
        <h1>Lista de Productos</h1>
        <div>
            <a href="/nuevo" class="btn btn-success">Añadir Producto</a>
            <a href="/reporte" class="btn btn-danger">Descargar PDF</a>
        </div>
    </div>

    <table class="table table-hover border">
        <thead class="table-dark">
            <tr>
                <th>ID</th><th>Nombre</th><th>Precio</th><th>Stock</th><th>Acciones</th>
            </tr>
        </thead>
        <tbody>
            {% for p in productos %}
            <tr>
                <td>{{ p.id_producto }}</td>
                <td>{{ p.nombre }}</td>
                <td>${{ p.precio }}</td>
                <td>{{ p.stock }}</td>
                <td>
                    <a href="/eliminar/{{ p.id_producto }}" 
                       class="btn btn-sm btn-outline-danger" 
                       onclick="return confirm('¿Seguro que desea eliminarlo?')">Eliminar</a>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</body>
</html>
